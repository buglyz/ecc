name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: |
          go build -ldflags="-s -w -H windowsgui" -o ecc.exe ./cmd/fan-controller/

      - name: Package Release
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item -Path ecc.exe -Destination release/
          Copy-Item -Path assets -Destination release/ -Recurse
          Compress-Archive -Path release/* -DestinationPath ecc-windows-amd64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          files: ecc-windows-amd64.zip
