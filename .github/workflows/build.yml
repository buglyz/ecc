name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Security Scan
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: |
          go build -ldflags="-s -w -H windowsgui" -o ecc.exe ./cmd/fan-controller/

      - name: Package Artifact
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item -Path ecc.exe -Destination dist/
          Copy-Item -Path assets -Destination dist/ -Recurse
          Copy-Item -Path install.ps1 -Destination dist/
          Copy-Item -Path uninstall.ps1 -Destination dist/
          Copy-Item -Path README.md -Destination dist/

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ecc-windows-amd64
          path: dist/
